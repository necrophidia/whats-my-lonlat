<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's My Lon/Lat?</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' https://unpkg.com 'unsafe-inline'; img-src 'self' https://*.basemaps.cartocdn.com data: blob:; connect-src 'self' https://nominatim.openstreetmap.org https://router.project-osrm.org;">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="tabs">
        <button class="tab active" data-tab="locate">My Location</button>
        <button class="tab" data-tab="distance">Distance Calculator</button>
    </nav>

    <main>
        <!-- My Location Tab -->
        <section id="locate" class="tab-content active">
            <div class="card">
                <h1>What's My Lon/Lat?</h1>
                <p class="subtitle">Find your current coordinates using your browser's geolocation. Click the map or drag the marker to refine.</p>
                <button id="locate-btn" class="btn primary">Find My Location</button>
                <div id="locate-status" class="status" hidden></div>
                <div id="locate-coords" class="coords" hidden>
                    <div class="coord-group">
                        <label>Latitude</label>
                        <span id="lat-value" class="coord-value">—</span>
                    </div>
                    <div class="coord-group">
                        <label>Longitude</label>
                        <span id="lng-value" class="coord-value">—</span>
                    </div>
                    <div class="coord-group">
                        <label>Accuracy</label>
                        <span id="acc-value" class="coord-value">—</span>
                    </div>
                    <button id="copy-btn" class="btn small">Copy Coordinates</button>
                </div>
            </div>
            <div id="locate-map" class="map-container"></div>
        </section>

        <!-- Distance Calculator Tab -->
        <section id="distance" class="tab-content">
            <div class="card">
                <h1>Distance Calculator</h1>
                <p class="subtitle">Calculate the distance between two points on the map.</p>
                <div class="input-row">
                    <div class="input-group">
                        <label for="origin">Origin</label>
                        <input id="origin" type="text" placeholder="Search for a place...">
                        <ul id="origin-suggestions" class="suggestions" hidden></ul>
                    </div>
                    <div class="input-group">
                        <label for="destination">Destination</label>
                        <input id="destination" type="text" placeholder="Search for a place...">
                        <ul id="destination-suggestions" class="suggestions" hidden></ul>
                    </div>
                    <button id="calc-btn" class="btn primary" disabled>Calculate</button>
                </div>
                <div id="distance-result" class="result" hidden>
                    <div class="result-item">
                        <label>Distance</label>
                        <span id="dist-value" class="result-value">—</span>
                    </div>
                    <div class="result-item">
                        <label>Duration</label>
                        <span id="duration-value" class="result-value">—</span>
                    </div>
                    <div class="result-item">
                        <label>Origin</label>
                        <span id="origin-coords" class="result-value small">—</span>
                    </div>
                    <div class="result-item">
                        <label>Destination</label>
                        <span id="dest-coords" class="result-value small">—</span>
                    </div>
                </div>
            </div>
            <div id="distance-map" class="map-container"></div>
        </section>
    </main>

    <footer>
        <p>Built with <a href="https://leafletjs.com" target="_blank" rel="noopener">Leaflet</a> & <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a></p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
